<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلب عضوية</title>
<style>
body { font-family: 'Cairo', Arial, sans-serif; direction: rtl; margin: 20px; }
form { max-width: 500px; margin:auto; border:1px solid #ccc; padding:20px; border-radius:8px; }
input, textarea { width:100%; padding:8px; margin-bottom:12px; border-radius:4px; border:1px solid #aaa; }
button { padding:10px 18px; background:#003366; color:#fff; border:none; border-radius:6px; cursor:pointer; }
button:hover { background:#0055aa; }
h2 { text-align:center; color:#003366; margin-bottom:20px; }
</style>
</head>
<body>
<h2>نموذج طلب عضوية</h2>
<form method="POST">
<label>الاسم:</label>
<input type="text" name="name" required>
<label>العمر:</label>
<input type="number" name="age" required>
<label>رقم الهاتف:</label>
<input type="text" name="phone" required>
<label>البريد الإلكتروني:</label>
<input type="email" name="email">
<label>لماذا تريد الانضمام؟</label>
<textarea name="reason" required></textarea>
<button type="submit">إرسال الطلب</button>
</form>
</body>
</html>
